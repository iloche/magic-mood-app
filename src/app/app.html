<main class="main">

  <div class="app-wrapper">
    <div class="color-overlay" [style.background-color]="currentMood()?.secondaryColor + '66'"></div>
  
  <div id="pixie-container"></div>

  <div class="container">
    <h1>{{ title() }}</h1>

    <button class="btn-magic" (click)="pickRandomMood($event)">
      Invoquer la magie ✨
    </button>

    @if (showCard() && currentMood(); as mood) {
      <div class="mood-card" [style.background]="'linear-gradient(135deg,' + mood.color + ',' + mood.secondaryColor + ')'">
        <span class="emoji">{{ mood.emoji }}</span>
        <h2>{{ mood.label }}</h2>
        <em>"{{ mood.quote }}"</em>
      </div>
    }
  </div>
</div>

</main>
